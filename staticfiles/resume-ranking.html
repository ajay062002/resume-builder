    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
// Auth.jsx — Login screen

const authStyles = {
  root: { display:'flex', minHeight:'100vh', background:'#0d1117', fontFamily:"'Plus Jakarta Sans', sans-serif" },
  left: { flex:'0 0 400px', background:'linear-gradient(160deg,#0f2744 0%,#0a1f38 60%,#061020 100%)', display:'flex', flexDirection:'column', justifyContent:'center', padding:'60px 48px', position:'relative', overflow:'hidden' },
  glow: { position:'absolute', width:400, height:400, borderRadius:'50%', background:'radial-gradient(circle, rgba(45,212,191,0.08) 0%, transparent 70%)', top:-100, right:-100, pointerEvents:'none' },
  logoWrap: { display:'flex', alignItems:'center', gap:12, marginBottom:24 },
  logoMark: { width:48, height:48, background:'linear-gradient(135deg,#2dd4bf,#06b6d4)', borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, fontWeight:800, color:'#0d1117' },
  brandName: { fontSize:24, fontWeight:800, color:'#e6edf3', margin:0 },
  tagline: { fontSize:28, fontWeight:700, color:'#e6edf3', margin:'0 0 12px', lineHeight:1.3 },
  taglineSub: { fontSize:15, color:'#64748b', margin:'0 0 40px', lineHeight:1.6 },
  features: { display:'flex', flexDirection:'column', gap:14 },
  feature: { display:'flex', alignItems:'center', gap:12, color:'#8b949e', fontSize:14 },
  featureDot: { width:6, height:6, borderRadius:'50%', background:'#2dd4bf', flexShrink:0 },
  right: { flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:40 },
  card: { width:'100%', maxWidth:420, background:'#161b22', border:'1px solid #21262d', borderRadius:16, padding:40 },
  cardTitle: { fontSize:22, fontWeight:700, color:'#e6edf3', margin:'0 0 6px' },
  cardSub: { fontSize:14, color:'#8b949e', margin:'0 0 28px' },
  roleTabs: { display:'flex', background:'#0d1117', borderRadius:10, padding:4, marginBottom:28, gap:4 },
  roleTab: { flex:1, padding:'8px 0', border:'none', borderRadius:8, background:'transparent', color:'#8b949e', cursor:'pointer', fontSize:13, fontWeight:500, fontFamily:"'Plus Jakarta Sans', sans-serif", transition:'all 0.2s' },
  roleTabActive: { background:'#1c2333', color:'#2dd4bf', boxShadow:'0 1px 4px rgba(0,0,0,0.4)' },
  field: { marginBottom:18 },
  label: { display:'block', fontSize:12, fontWeight:600, color:'#8b949e', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:7 },
  input: { width:'100%', padding:'11px 14px', background:'#0d1117', border:'1px solid #30363d', borderRadius:9, color:'#e6edf3', fontSize:14, fontFamily:"'Plus Jakarta Sans', sans-serif", boxSizing:'border-box', outline:'none' },
  error: { color:'#f85149', fontSize:13, margin:'-6px 0 14px', padding:'8px 12px', background:'rgba(248,81,73,0.08)', borderRadius:8 },
  submitBtn: { width:'100%', padding:13, background:'linear-gradient(135deg,#2dd4bf,#0891b2)', border:'none', borderRadius:10, color:'#0d1117', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:"'Plus Jakarta Sans', sans-serif", marginTop:6 },
  demoBox: { marginTop:16, padding:'10px 14px', background:'rgba(45,212,191,0.06)', border:'1px solid rgba(45,212,191,0.15)', borderRadius:8 },
  demoText: { fontSize:12, color:'#2dd4bf', margin:0 },
};

const LoginScreen = ({ onLogin }) => {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [role, setRole] = React.useState('student');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [mode, setMode] = React.useState('login');

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email || !password) { setError('Please fill in all fields.'); return; }
    setLoading(true); setError('');
    try {
      await fetch('/api/csrf/', { credentials: 'include' });
      const res = await fetch('/api/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username: email, password }),
      });
      const data = await res.json();
      if (data.success) {
        onLogin({ role: data.role === 'admin' ? 'admin' : 'student', email: data.email, name: data.name });
      } else {
        setError(data.error || 'Invalid credentials');
        setLoading(false);
      }
    } catch (err) {
      setError('Connection error. Is the server running?');
      setLoading(false);
    }
  };

  return (
    <div style={authStyles.root}>
      <div style={authStyles.left}>
        <div style={authStyles.glow} />
        <div style={authStyles.logoWrap}>
          <div style={authStyles.logoMark}>R</div>
          <span style={authStyles.brandName}>Resume Ranking</span>
        </div>
        <h1 style={authStyles.tagline}>Build your career,<br/>land your role.</h1>
        <p style={authStyles.taglineSub}>One platform for students to showcase resumes and recruiters to find top talent by skill.</p>
        <div style={authStyles.features}>
          {['Step-by-step resume builder','Live resume preview as you type','PDF resume generation','Skill-based candidate ranking'].map(f => (
            <div key={f} style={authStyles.feature}><div style={authStyles.featureDot}/><span>{f}</span></div>
          ))}
        </div>
      </div>
      <div style={authStyles.right}>
        <div style={authStyles.card}>
          {mode === 'login' ? <>
            <h2 style={authStyles.cardTitle}>Welcome back</h2>
            <p style={authStyles.cardSub}>Sign in to continue</p>
            <div style={authStyles.roleTabs}>
              {[['student','Student'],['admin','Recruiter / Admin']].map(([r,label]) => (
                <button key={r} onClick={() => { setRole(r); setError(''); setEmail(''); setPassword(''); }}
                  style={{ ...authStyles.roleTab, ...(role===r ? authStyles.roleTabActive : {}) }}>{label}</button>
              ))}
            </div>
            <form onSubmit={handleSubmit}>
              <div style={authStyles.field}>
                <label style={authStyles.label}>{role==='admin' ? 'Username' : 'Email Address'}</label>
                <input style={authStyles.input} type={role==='admin' ? 'text' : 'email'}
                  placeholder={role==='admin' ? 'admin' : 'you@example.com'}
                  value={email} onChange={e => setEmail(e.target.value)} autoFocus />
              </div>
              <div style={authStyles.field}>
                <label style={authStyles.label}>Password</label>
                <input style={authStyles.input} type="password" placeholder="••••••••"
                  value={password} onChange={e => setPassword(e.target.value)} />
              </div>
              {error && <p style={authStyles.error}>{error}</p>}
              <button type="submit" style={{ ...authStyles.submitBtn, opacity: loading ? 0.7 : 1 }} disabled={loading}>
                {loading ? 'Signing in…' : 'Sign In'}
              </button>
            </form>
            {role === 'student' && (
              <p style={{marginTop:16,textAlign:'center',fontSize:13,color:'#8b949e'}}>
                New here?{' '}
                <button onClick={() => { setMode('register'); setError(''); setEmail(''); setPassword(''); }}
                  style={{background:'none',border:'none',color:'#2dd4bf',cursor:'pointer',fontSize:13,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                  Create an account
                </button>
              </p>
            )}
          </> : <>
            <h2 style={authStyles.cardTitle}>Create account</h2>
            <p style={authStyles.cardSub}>Join as a student to build your resume</p>
            <form onSubmit={handleSubmit}>
              <div style={authStyles.field}>
                <label style={authStyles.label}>Full Name</label>
                <input style={authStyles.input} type="text" placeholder="Ajay Thota"
                  value={name} onChange={e => setName(e.target.value)} autoFocus />
              </div>
              <div style={authStyles.field}>
                <label style={authStyles.label}>Email Address</label>
                <input style={authStyles.input} type="email" placeholder="you@example.com"
                  value={email} onChange={e => setEmail(e.target.value)} />
              </div>
              <div style={authStyles.field}>
                <label style={authStyles.label}>Password</label>
                <input style={authStyles.input} type="password" placeholder="Choose a password"
                  value={password} onChange={e => setPassword(e.target.value)} />
              </div>
              {error && <p style={authStyles.error}>{error}</p>}
              <button type="submit" style={{ ...authStyles.submitBtn, opacity: loading ? 0.7 : 1 }} disabled={loading}>
                {loading ? 'Creating account…' : 'Create Account'}
              </button>
            </form>
            <p style={{marginTop:16,textAlign:'center',fontSize:13,color:'#8b949e'}}>
              Already have an account?{' '}
              <button onClick={() => { setMode('login'); setError(''); }}
                style={{background:'none',border:'none',color:'#2dd4bf',cursor:'pointer',fontSize:13,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                Sign in
              </button>
            </p>
          </>}
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { LoginScreen });

// ResumePreview.jsx

const resumePreviewStyles = {
  paper: { background:'#fff', borderRadius:3, padding:'24px 22px 28px', color:'#1a1a1a', minHeight:600, boxShadow:'0 12px 48px rgba(0,0,0,0.5)', fontFamily:'Arial, sans-serif' },
  name: { fontSize:20, fontWeight:800, color:'#000', margin:'0 0 3px', letterSpacing:'-0.01em' },
  contactRow: { fontSize:9, color:'#555', margin:'0 0 8px', lineHeight:1.5 },
  divider: { border:'none', borderTop:'1.5px solid #000', margin:'0 0 10px' },
  thinDivider: { border:'none', borderTop:'0.5px solid #888', margin:'3px 0 6px' },
  section: { marginBottom:11 },
  secTitle: { fontSize:10, fontWeight:800, color:'#000', textDecoration:'underline', textTransform:'uppercase', letterSpacing:'0.06em', margin:'0 0 1px' },
  twoCol: { display:'grid', gridTemplateColumns:'90px 1fr', gap:'2px 8px', fontSize:9.5 },
  colLabel: { fontWeight:700, color:'#1a1a1a' },
  colVal: { color:'#333' },
  eduRow: { display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4 },
  eduTitle: { fontSize:10, fontWeight:700, color:'#222' },
  eduSub: { fontSize:9, color:'#666', marginLeft:4 },
  eduPct: { fontSize:10, fontWeight:700, color:'#1a56db', flexShrink:0 },
  skillGrid: { display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'2px 6px', fontSize:9.5 },
  skillItem: { color:'#222' },
  bullet: { fontSize:9.5, color:'#333', margin:'1px 0', lineHeight:1.45, paddingLeft:10 },
  projectTitle: { fontSize:10, fontWeight:700, color:'#222', margin:'0 0 2px' },
  body: { fontSize:9.5, color:'#444', margin:'0 0 3px', lineHeight:1.5 },
  empty: { textAlign:'center', padding:'48px 0', color:'#ccc' },
  emptyIcon: { fontSize:28, marginBottom:8 },
  emptyText: { fontSize:11 },
};

const ResumePreview = ({ profile }) => {
  const rs = resumePreviewStyles;
  const has = k => profile[k] && String(profile[k]).trim() && String(profile[k]).trim() !== 'None';
  const list = str => str ? str.split(',').map(x => x.trim()).filter(Boolean) : [];

  const isEmpty = !has('name') && !has('skills') && !has('degreebranch') && !has('careerobjective');

  const Section = ({ title, children }) => (
    <div style={rs.section}>
      <div style={rs.secTitle}>{title}</div>
      <hr style={rs.thinDivider} />
      {children}
    </div>
  );

  return (
    <div style={rs.paper}>
      {/* Header */}
      <h1 style={rs.name}>{has('name') ? profile.name : <span style={{opacity:0.3,fontSize:16}}>Your Name</span>}</h1>
      {(has('email')||has('mobile')||has('address')) && (
        <div style={rs.contactRow}>
          {[profile.email, profile.mobile, profile.address].filter(v => v && String(v).trim()).join('   |   ')}
        </div>
      )}
      <hr style={rs.divider} />

      {/* Professional Summary */}
      {has('careerobjective') && (
        <Section title="Professional Summary">
          {String(profile.careerobjective).split('\n').filter(l=>l.trim()).map((l,i) =>
            <div key={i} style={rs.bullet}>• {l.trim()}</div>
          )}
        </Section>
      )}

      {/* Education */}
      {(has('degreebranch')||has('intermediatebranch')||has('sscpercentage')) && (
        <Section title="Education">
          {has('degreebranch') && (
            <div style={rs.eduRow}>
              <span><span style={rs.eduTitle}>Degree</span><span style={rs.eduSub}>{profile.degreebranch}</span></span>
              {has('degreepercentage') && <span style={rs.eduPct}>{profile.degreepercentage}%</span>}
            </div>
          )}
          {has('intermediatebranch') && (
            <div style={rs.eduRow}>
              <span><span style={rs.eduTitle}>Intermediate (12th)</span><span style={rs.eduSub}>{profile.intermediatebranch}</span></span>
              {has('intermediatepercentage') && <span style={rs.eduPct}>{profile.intermediatepercentage}%</span>}
            </div>
          )}
          {has('sscpercentage') && (
            <div style={rs.eduRow}>
              <span style={rs.eduTitle}>SSC (10th)</span>
              <span style={rs.eduPct}>{profile.sscpercentage}%</span>
            </div>
          )}
        </Section>
      )}

      {/* Technical Skills */}
      {has('skills') && (
        <Section title="Technical Skills">
          <div style={rs.skillGrid}>
            {list(profile.skills).map(s => <span key={s} style={rs.skillItem}>• {s}</span>)}
          </div>
        </Section>
      )}

      {/* Key Strengths */}
      {(has('personalstrengths')||has('professionalstrengths')) && (
        <Section title="Key Strengths">
          <div style={rs.twoCol}>
            {has('personalstrengths') && <><span style={rs.colLabel}>Personal</span><span style={rs.colVal}>{profile.personalstrengths}</span></>}
            {has('professionalstrengths') && <><span style={rs.colLabel}>Professional</span><span style={rs.colVal}>{profile.professionalstrengths}</span></>}
          </div>
        </Section>
      )}

      {/* Projects */}
      {has('projecttitle') && (
        <Section title="Projects">
          <div style={rs.projectTitle}>{profile.projecttitle}</div>
          {has('projectdescription') && String(profile.projectdescription).split('\n').filter(l=>l.trim()).map((l,i)=>
            <div key={i} style={rs.bullet}>• {l.trim()}</div>
          )}
        </Section>
      )}

      {/* Experience */}
      {(has('yearofExperience')||has('currentworkingcompany')) && (
        <Section title="Professional Experience">
          <div style={rs.twoCol}>
            {has('currentworkingcompany') && <><span style={rs.colLabel}>Company</span><span style={rs.colVal}>{profile.currentworkingcompany}</span></>}
            {has('yearofExperience') && <><span style={rs.colLabel}>Experience</span><span style={rs.colVal}>{profile.yearofExperience} year{profile.yearofExperience!=='1'?'s':''}</span></>}
          </div>
        </Section>
      )}

      {/* Personal Information */}
      {(has('dob')||has('gender')||has('nationality')||has('languages')) && (
        <Section title="Personal Information">
          <div style={rs.twoCol}>
            {has('dob') && <><span style={rs.colLabel}>Date of Birth</span><span style={rs.colVal}>{profile.dob}</span></>}
            {has('gender') && <><span style={rs.colLabel}>Gender</span><span style={rs.colVal}>{profile.gender}</span></>}
            {has('nationality') && <><span style={rs.colLabel}>Nationality</span><span style={rs.colVal}>{profile.nationality}</span></>}
            {has('languages') && <><span style={rs.colLabel}>Languages</span><span style={rs.colVal}>{profile.languages}</span></>}
          </div>
        </Section>
      )}

      {isEmpty && (
        <div style={rs.empty}>
          <div style={rs.emptyIcon}>📄</div>
          <div style={rs.emptyText}>Your resume appears here as you fill in the form</div>
        </div>
      )}
    </div>
  );
};

Object.assign(window, { ResumePreview });

const FF = ({ label, hint, value, onChange, type='text', placeholder, full, minH }) => (
  <div style={{ ...studentStyles.fWrap, ...(full ? { gridColumn:'1 / -1' } : {}) }}>
    <label style={studentStyles.fLabel}>{label}{hint && <span style={studentStyles.fHint}> — {hint}</span>}</label>
    {type === 'textarea'
      ? <textarea style={{ ...studentStyles.fTextarea, minHeight: minH || 80 }} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
      : <input style={studentStyles.fInput} type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
    }

);

const PersonalStep = ({ p, u }) => {
  const [uploading, setUploading] = React.useState(false);
  const [picLabel, setPicLabel] = React.useState(p.pic ? 'Photo uploaded ✓' : 'Upload Photo');
  const fileRef = React.useRef();

  const handlePic = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    const fd = new FormData();
    fd.append('pic', file);
    fetch('/api/profile/pic/', { method:'POST', body: fd, credentials:'include' })
      .then(r => r.json())
      .then(d => {
        if (d.success) { setPicLabel('Photo uploaded ✓'); u('pic', d.pic); }
        else setPicLabel('Upload failed');
      })
      .catch(() => setPicLabel('Upload failed'))
      .finally(() => setUploading(false));
  };

  return (
    <div style={studentStyles.stepGrid}>
      <FF label="Full Name" value={p.name} onChange={v=>u('name',v)} placeholder="Jane Doe" />
      <FF label="Email" value={p.email} onChange={v=>u('email',v)} type="email" placeholder="jane@example.com" />
      <FF label="Mobile" value={p.mobile} onChange={v=>u('mobile',v)} placeholder="+91 98765 43210" />
      <FF label="Date of Birth" value={p.dob} onChange={v=>u('dob',v)} type="date" />
      <FF label="Gender" value={p.gender} onChange={v=>u('gender',v)} placeholder="Female" />
      <FF label="Nationality" value={p.nationality} onChange={v=>u('nationality',v)} placeholder="Indian" />
      <FF label="Languages" value={p.languages} onChange={v=>u('languages',v)} placeholder="English, Hindi" />
      <FF label="Address" value={p.address} onChange={v=>u('address',v)} type="textarea" placeholder="123 Main St, City" full />
      <div style={{ gridColumn:'1 / -1' }}>
        <label style={studentStyles.fLabel}>Profile Photo</label>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePic} />
        <button type="button" onClick={() => fileRef.current.click()}
          style={{ padding:'8px 18px', borderRadius:8, border:'1px dashed #30363d', background:'rgba(45,212,191,0.07)', color: picLabel.includes('✓') ? '#3fb950' : '#2dd4bf', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:"'Plus Jakarta Sans',sans-serif" }}>
          {uploading ? 'Uploading…' : picLabel}
        </button>
      </div>
    </div>
  );
};

  // Load profile from server on mount
  React.useEffect(() => {
    fetch('/api/profile/', { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        if (!data.error) {
          setProfile(prev => ({ ...prev, ...data }));
        }
      })
      .catch(() => {});
  }, []);

  const update = (key, val) => setProfile(prev => ({ ...prev, [key]: val }));

  const handleSave = async () => {
    setSaveErr('');
    try {
      const { pic, ...body } = profile;
      const res = await fetch('/api/profile/update/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.success) {
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      } else {
        setSaveErr('Save failed');
      }
    } catch {
      setSaveErr('Connection error');
    }
  };

  return (

                    style={{ ...studentStyles.saveBtn, background: saved ? '#3fb950' : 'linear-gradient(135deg,#2dd4bf,#0891b2)', marginTop:4 }}>
                    {saved ? '✓ Saved' : 'Save'}

              <div style={studentStyles.stepTabs}>

                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

            {searched && (
              results.length === 0
                ? <div style={adminStyles.emptyBox}>No candidates found for those skills.</div>
                : <>
                  <div style={adminStyles.resultsLabel}>{results.length} candidate{results.length!==1?'s':''} found</div>
                  <div style={adminStyles.candidateList}>
                    {results.map((c, i) => {
                      const cSkills = (c.skills||'').split(',').map(s=>s.trim().toLowerCase());
                      const pct = skillList.length ? Math.round((c.score/skillList.length)*100) : 0;
                      return (
                        <div key={c.email} style={adminStyles.candidateCard}>
                          <div style={adminStyles.candidateTop}>
                            <div style={adminStyles.candidateLeft}>
                              <div style={adminStyles.rankBadge}>#{i+1}</div>
                              <div>
                                <div style={adminStyles.candidateName}>{c.name}</div>
                                <div style={adminStyles.candidateMeta}>{c.email}{c.currentworkingcompany ? ` · ${c.currentworkingcompany}` : ''}</div>
                              </div>
                            </div>
                            <div style={adminStyles.scoreWrap}>
                              <div style={adminStyles.scoreFrac}>{c.score}<span style={{fontSize:12,color:'#484f58'}}>/{skillList.length}</span></div>
                              <div style={adminStyles.scoreLabel}>skills matched</div>
                            </div>
                          </div>
                          <div style={adminStyles.matchBar}><div style={{ ...adminStyles.matchFill, width:`${pct}%` }} /></div>
                          <div style={adminStyles.tagRow}>
                            {cSkills.map(s => (
                              <span key={s} style={{ ...adminStyles.tag, ...(skillList.includes(s) ? adminStyles.tagMatch : {}) }}>{s}</span>
                            ))}
                          </div>
                          <a href={`/download?email=${c.email}`} style={{display:'inline-block',marginTop:12,fontSize:12,color:'#2dd4bf'}}>Download Resume PDF →</a>
                        </div>
                      );
                    })}
                  </div>
                </>
            )}
            {!searched && <div style={adminStyles.dashedBox}>Enter skills above to find matching candidates</div>}
          </>}

          {activeNav === 'post' && <>
            <h1 style={adminStyles.pageTitle}>Post a Job</h1>
            <p style={adminStyles.pageSub}>Students will be matched based on their registered skills.</p>
            {postMsg && <div style={{marginBottom:16,padding:'10px 14px',background:'rgba(45,212,191,0.08)',border:'1px solid rgba(45,212,191,0.2)',borderRadius:8,color:'#2dd4bf',fontSize:13}}>{postMsg}</div>}
            <form style={adminStyles.postForm} onSubmit={handlePost}>
              <div style={adminStyles.fGroup}>
                <label style={adminStyles.fLabel}>Job Title</label>
                <input style={adminStyles.fInput} value={postTitle} onChange={e=>setPostTitle(e.target.value)} placeholder="e.g. Backend Engineer" required />
              </div>
              <div style={adminStyles.fGroup}>
                <label style={adminStyles.fLabel}>Required Skills <span style={adminStyles.fHint}>— comma separated</span></label>
                <input style={adminStyles.fInput} value={postSkills} onChange={e=>setPostSkills(e.target.value)} placeholder="Python, Django, SQL" required />
              </div>
              <div style={adminStyles.fGroup}>
                <label style={adminStyles.fLabel}>Description</label>
                <textarea style={adminStyles.fTextarea} value={postDesc} onChange={e=>setPostDesc(e.target.value)} placeholder="Describe the role..." required />
              </div>
              <button type="submit" style={{ ...adminStyles.postBtn, background:'linear-gradient(135deg,#2dd4bf,#0891b2)' }}>Post Job</button>
            </form>
          </>}

          {activeNav === 'jobs' && <>
            <h1 style={adminStyles.pageTitle}>Job Board</h1>
            <p style={adminStyles.pageSub}>All active job postings.</p>
            {notifications.length === 0
              ? <div style={adminStyles.dashedBox}>No jobs posted yet. <button style={{background:'none',border:'none',color:'#2dd4bf',cursor:'pointer',fontSize:13}} onClick={()=>setActiveNav('post')}>Post one →</button></div>
              : notifications.map(n => (
                <div key={n.id} style={adminStyles.notifCard}>
                  <div style={adminStyles.notifTop}>
                    <div>
                      <div style={adminStyles.notifTitle}>{n.title}</div>
                      <div style={adminStyles.notifDate}>{n.date}</div>
                    </div>
                    <button style={adminStyles.deleteBtn} onClick={() => setNotifications(prev => prev.filter(x=>x.id!==n.id))}>Delete</button>
                  </div>
                  <p style={adminStyles.notifDesc}>{n.description}</p>
                  <div style={adminStyles.tagRow}>{(n.skills||'').split(',').map(s=><span key={s} style={adminStyles.tag}>{s.trim()}</span>)}</div>
                </div>
              ))
            }
          </>}
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { AdminPortal });


  const TWEAK_DEFAULTS = { resumeTemplate: "modern", accentColor: "#2dd4bf" };

  function App() {
    const [user, setUser] = React.useState(() => {
      try { const u = sessionStorage.getItem('rb_user'); return u ? JSON.parse(u) : null; } catch { return null; }
    });
    const tweaks = { ...TWEAK_DEFAULTS };
    const login = (u) => { sessionStorage.setItem('rb_user', JSON.stringify(u)); setUser(u); };
    const logout = () => { sessionStorage.removeItem('rb_user'); setUser(null); };
    if (!user) return <LoginScreen onLogin={login} />;
    if (user.role === 'admin') return <AdminPortal onLogout={logout} />;
    return <StudentPortal user={user} onLogout={logout} tweaks={tweaks} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
