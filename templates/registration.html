<\!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Ranking – Register</title>
  <link rel="stylesheet" href="{% static 'style/style.css' %}">
</head>
<body>
<nav>
  <span style="color:#f1f5f9;font-weight:700;font-size:1.05rem;">Resume Ranking</span>
  <ul>
    <li><a href="/login">Home</a></li>
    <li><a href="/registration">Register</a></li>
  </ul>
</nav>

<div class="container">
  {% if message %}
  <div class="message {% if 'fail' in message|lower or 'error' in message|lower or 'already' in message|lower %}error{% endif %}">
    {{ message }}
  </div>
  {% endif %}

  <form action="/regaction/" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <h2>Create Account</h2>
    <p style="color:#64748b;font-size:.88rem;margin-top:-12px;margin-bottom:8px;">Fill in your details to get started</p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px;">
      <div>
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Ajay Thota" required>
      </div>
      <div>
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div>
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required>
      </div>
      <div>
        <label>Mobile</label>
        <input type="number" name="mobile" placeholder="Phone number" required>
      </div>
      <div>
        <label>Date of Birth</label>
        <input type="date" name="dob" required>
      </div>
      <div>
        <label>Gender</label>
        <select name="gender" required>
          <option value="">-- Select --</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label>Nationality</label>
        <input type="text" name="nationality" placeholder="e.g. Indian" required>
      </div>
      <div>
        <label>Languages Known</label>
        <input type="text" name="languages" placeholder="e.g. English, Hindi" required>
      </div>
    </div>

    <label>Address</label>
    <textarea name="address" placeholder="Your full address" required></textarea>

    <label>Profile Photo</label>
    <input type="file" name="pic" accept="image/*" required>

    <input type="submit" value="Create Account" style="width:100%;margin-top:24px;">
    <p style="text-align:center;margin-top:14px;font-size:.88rem;color:#64748b;">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </form>
</div>
</body>
</html>
