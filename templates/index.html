<\!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Ranking – Login</title>
  <link rel="stylesheet" href="{% static 'style/style.css' %}">
  <style>
    .login-wrap { min-height: calc(100vh - 57px); display: flex; align-items: center; justify-content: center; }
    .login-wrap form { width: 100%; max-width: 420px; margin: 0; }
  </style>
</head>
<body>
<nav>
  <span style="color:#f1f5f9;font-weight:700;font-size:1.05rem;letter-spacing:.3px;">Resume Ranking</span>
  <ul>
    <li><a href="/login">Home</a></li>
    <li><a href="/registration">Register</a></li>
  </ul>
</nav>

<div class="login-wrap">
  <div style="width:100%;max-width:460px;padding:0 24px;">
    {% if message %}
    <div class="message {% if 'invalid' in message|lower or 'fail' in message|lower or 'wrong' in message|lower %}error{% endif %}">
      {{ message }}
    </div>
    {% endif %}
    <form action="/loginaction/" method="get">
      {% csrf_token %}
      <h2 style="text-align:center;border:none;padding-bottom:4px;margin-bottom:4px;">Welcome back</h2>
      <p style="text-align:center;color:#64748b;font-size:.9rem;margin-bottom:20px;">Sign in to your account</p>
      <label>Email / Username</label>
      <input type="text" name="username" placeholder="Enter your email" required autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
      <input type="submit" value="Sign In" style="width:100%;margin-top:24px;">
      <p style="text-align:center;margin-top:16px;font-size:.88rem;color:#64748b;">
        Don't have an account? <a href="/registration">Register here</a>
      </p>
    </form>
  </div>
</div>
</body>
</html>
