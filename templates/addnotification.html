<\!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Ranking – Post Job</title>
  <link rel="stylesheet" href="{% static 'style/style.css' %}">
</head>
<body>
<nav>
  <span style="color:#f1f5f9;font-weight:700;font-size:1.05rem;">Resume Ranking</span>
  <ul>
    <li><a href="/search">Search</a></li>
    <li><a href="/addnotification">Post Job</a></li>
    <li><a href="/getnotifications">View Jobs</a></li>
    <li><a href="/logout">Logout</a></li>
  </ul>
</nav>

<div class="container">
  {% if message %}
  <div class="message {% if 'fail' in message|lower or 'error' in message|lower %}error{% endif %}">
    {{ message }}
  </div>
  {% endif %}

  <form action="/addnotificationaction" method="get" style="max-width:600px;margin:0 auto;">
    <h2>Post a Job</h2>
    <p style="color:#64748b;font-size:.88rem;margin-top:-12px;margin-bottom:8px;">Candidates will be matched based on required skills</p>

    <label>Job Title</label>
    <input type="text" name="title" placeholder="e.g. Backend Engineer" required>

    <label>Required Skills</label>
    <input type="text" name="skills" placeholder="e.g. Python, Django, SQL (comma separated)" required>

    <label>Job Description</label>
    <textarea name="description" placeholder="Describe the role, responsibilities, and requirements..." style="min-height:120px;" required></textarea>

    <input type="submit" value="Post Job" style="width:100%;margin-top:20px;">
  </form>
</div>
</body>
</html>
