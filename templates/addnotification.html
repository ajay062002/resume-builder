{% load  static%}
<!DOCTYPE HTML>
<html>

<head>
<title>Resume Ranking</title>
<link rel="stylesheet" type="text/css" href="{% static 'style/style.css'%}" title="style" />
</head>

<body>
	<div id="main">
		<div id="header">
			<div id="logo">
				<div id="logo_text">
					<!-- class="logo_colour", allows you to change the colour of the text -->
					<h3>
						<center><a href="#"><font color="white" size="5">Resume Ranking</font></a></center>
					</h3>
					<br/><br/>
				</div>
			</div>
			<div id="menubar">
				<ul id="menu">

                    <li><a href="/search">Search Profile</a></li>
                    <li><a href="/addnotification">Post Job Notification</a></li>
                    <li> <a href="/getnotifications">View Jobs</a></li>
                    <li><a href="/logout">Logout</a></li>

				</ul>
			</div>
		</div>
		<div id="content_header"></div>
		<div id="site_content">
			<div id="content">

				<h1>Post Notification : {{message}}</h1>

				<form name="form" action="/addnotificationaction">
					<div class="form_settings">

                        <p>
							<span>Job Title:</span><input class="contact" type="text" name="title" required/>
						</p>

                        <p>
							<span>Required Skills:</span><input class="contact" type="text" name="skills" required/>
						</p>

						<p>
                            <span>Description :</span><textarea class="contact" name="description" required></textarea>
						</p>

						<p style="padding-top: 15px">
							<span>&nbsp;</span><input class="submit" type="submit"
								name="contact_submitted" value="Post Job Notification" />
						</p>

					</div>
				</form>

			</div>
		</div>
	</div>
</body>
</html>
